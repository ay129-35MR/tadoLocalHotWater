esphome:
  name: hotwatertemp
  friendly_name: HotWaterTemp
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: wt32-eth01
  framework:
    type: arduino

# Ethernet configuration for WT32-ETH01 v1.4
ethernet:
  type: LAN8720
  mdc_pin: GPIO23
  mdio_pin: GPIO18
  clk:
    pin: GPIO0
    mode: CLK_EXT_IN
  phy_addr: 1
  power_pin: GPIO16

  manual_ip:
    static_ip: 192.168.1.104
    gateway: 192.168.1.1
    subnet: 255.255.255.0
    dns1: 192.168.1.1
    dns2: 8.8.8.8

# Web server for local REST API access (fallback monitor)
web_server:
  port: 80
  local: true

# DS18B20 one-wire bus
one_wire:
  - platform: gpio
    pin: GPIO4

globals:
  - id: ha_heartbeat_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: survival_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: fallback_low_temp
    type: float
    restore_value: yes
    initial_value: '38.0'
  - id: fallback_high_temp
    type: float
    restore_value: yes
    initial_value: '46.0'
  - id: max_safe_temp
    type: float
    restore_value: yes
    initial_value: '65.0'
  - id: max_on_seconds
    type: uint32_t
    restore_value: yes
    initial_value: '5400'
  - id: relay_on_since_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: relay_off_since_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: watchdog_lockout
    type: bool
    restore_value: no
    initial_value: 'false'
  # Suppress flags — set to true while HA-driven changes propagate down to the
  # local mirrors, so the on_value/on_turn handlers don't echo the change back
  # to HA and create a loop.
  - id: suppress_target_push
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: suppress_killswitch_push
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: suppress_survival_push
    type: bool
    restore_value: no
    initial_value: 'false'

sensor:
  # Hot water tank temperature (Dallas DS18B20)
  - platform: dallas_temp
    name: "hotwatertemp32"
    id: hotwatertemp32
    accuracy_decimals: 1
    update_interval: 30s

  # Uptime for diagnostics
  - platform: uptime
    type: seconds
    name: "Uptime"
    id: uptime_sensor

  # Free heap memory (simple template using ESP.getFreeHeap)
  - platform: template
    name: "Free Heap"
    id: free_heap
    lambda: 'return ESP.getFreeHeap();'
    update_interval: 60s
    unit_of_measurement: "bytes"
    entity_category: diagnostic

  # Effective survival thresholds (exposed for visibility)
  - platform: template
    name: "Hot Water Fallback Low"
    lambda: 'return id(fallback_low_temp);'
    update_interval: 60s
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    entity_category: diagnostic
  - platform: template
    name: "Hot Water Fallback High"
    lambda: 'return id(fallback_high_temp);'
    update_interval: 60s
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    entity_category: diagnostic
  - platform: template
    name: "Hot Water Max Safe Temp"
    lambda: 'return id(max_safe_temp);'
    update_interval: 60s
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    entity_category: diagnostic

  # Debug sensors (from ESPHome debug component)
  - platform: debug
    free:
      name: "ESP Heap Free"
    block:
      name: "ESP Heap Max Block"
    loop_time:
      name: "ESP Loop Time"

  # Subscribe to HA's user-facing target temp. When HA changes it (knob commit,
  # dashboard slider, automation), mirror the value into target_temp_local
  # without echoing it back.
  - platform: homeassistant
    entity_id: input_number.target_temp
    id: ha_target_subscriber
    internal: true
    on_value:
      then:
        - lambda: |-
            id(suppress_target_push) = true;
            auto call = id(target_temp_local).make_call();
            call.set_value(x);
            call.perform();
            id(suppress_target_push) = false;

binary_sensor:
  - platform: template
    name: "Hot Water HA Heartbeat Healthy"
    id: ha_heartbeat_healthy
    lambda: |-
      if (id(ha_heartbeat_ms) == 0) return false;
      return (millis() - id(ha_heartbeat_ms)) < 15UL * 60 * 1000;

  - platform: template
    name: "Hot Water Survival Active"
    lambda: |-
      const bool fresh = (id(ha_heartbeat_ms) != 0) &&
                         ((millis() - id(ha_heartbeat_ms)) < 15UL * 60 * 1000);
      return (!fresh) && id(survival_enabled);

  - platform: template
    name: "Hot Water Watchdog Lockout"
    lambda: 'return id(watchdog_lockout);'

  # Subscribe to HA's master killswitch ("Automations Enabled"). When HA flips
  # it, mirror onto the local switch without echoing back.
  - platform: homeassistant
    entity_id: input_boolean.hot_water_automation_enabled
    id: ha_killswitch_sub
    internal: true
    on_state:
      then:
        - lambda: |-
            id(suppress_killswitch_push) = true;
            if (x) id(automations_enabled).turn_on();
            else id(automations_enabled).turn_off();
            id(suppress_killswitch_push) = false;

  # Subscribe to HA's "Survival Allowed" toggle.
  - platform: homeassistant
    entity_id: input_boolean.hot_water_survival_enabled
    id: ha_survival_sub
    internal: true
    on_state:
      then:
        - lambda: |-
            id(suppress_survival_push) = true;
            if (x) id(survival_allowed).turn_on();
            else id(survival_allowed).turn_off();
            id(suppress_survival_push) = false;

# Text sensors from debug (reset reason etc.)
text_sensor:
  - platform: debug
    reset_reason:
      name: "ESP Reset Reason"

switch:
  - platform: gpio
    pin: GPIO14
    name: "Hot Water Relay"
    id: hot_water_relay
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - lambda: |-
          id(relay_on_since_ms) = millis();
          id(relay_off_since_ms) = 0;
    on_turn_off:
      - lambda: |-
          id(relay_off_since_ms) = millis();
          id(relay_on_since_ms) = 0;

  # Local mirror of input_boolean.hot_water_automation_enabled. Toggling here
  # propagates to HA; HA-side flips arrive via ha_killswitch_sub above.
  - platform: template
    name: "Automations Enabled"
    id: automations_enabled
    icon: "mdi:cog-outline"
    optimistic: true
    restore_mode: ALWAYS_ON
    turn_on_action:
      - if:
          condition:
            lambda: 'return !id(suppress_killswitch_push);'
          then:
            - homeassistant.service:
                service: input_boolean.turn_on
                data:
                  entity_id: input_boolean.hot_water_automation_enabled
    turn_off_action:
      - if:
          condition:
            lambda: 'return !id(suppress_killswitch_push);'
          then:
            - homeassistant.service:
                service: input_boolean.turn_off
                data:
                  entity_id: input_boolean.hot_water_automation_enabled

  # Local mirror of input_boolean.hot_water_survival_enabled.
  - platform: template
    name: "Survival Allowed"
    id: survival_allowed
    icon: "mdi:lifebuoy"
    optimistic: true
    restore_mode: ALWAYS_ON
    turn_on_action:
      - if:
          condition:
            lambda: 'return !id(suppress_survival_push);'
          then:
            - homeassistant.service:
                service: input_boolean.turn_on
                data:
                  entity_id: input_boolean.hot_water_survival_enabled
    turn_off_action:
      - if:
          condition:
            lambda: 'return !id(suppress_survival_push);'
          then:
            - homeassistant.service:
                service: input_boolean.turn_off
                data:
                  entity_id: input_boolean.hot_water_survival_enabled

# Writable target-temp mirror. The web UI slider edits this; on_value pushes
# the change up to HA's input_number.target_temp (unless suppressed by the
# subscriber that just received an HA-driven update).
number:
  - platform: template
    name: "Target Temp"
    id: target_temp_local
    icon: "mdi:thermometer"
    min_value: 40
    max_value: 65
    step: 1
    optimistic: true
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !id(suppress_target_push);'
            then:
              - homeassistant.service:
                  service: input_number.set_value
                  data:
                    entity_id: input_number.target_temp
                    value: !lambda 'return x;'

# Buttons: restart + clear watchdog lockout
button:
  - platform: restart
    name: "Restart"
    entity_category: config
  - platform: template
    name: "Hot Water Clear Lockout"
    entity_category: config
    on_press:
      - lambda: 'id(watchdog_lockout) = false;'

# Single safety + survival loop (runs every 30s)
interval:
  - interval: 30s
    then:
      - lambda: |-
          const uint32_t now = millis();
          const float t = id(hotwatertemp32).state;
          const bool sensor_bad = isnan(t);

          // ---- HARD SAFETY (always) ----
          if (!sensor_bad && t >= id(max_safe_temp)) {
            if (id(hot_water_relay).state) {
              ESP_LOGW("hw_safety", "Over-temp %.1f >= %.1f -> OFF + lockout",
                       t, id(max_safe_temp));
              id(hot_water_relay).turn_off();
              id(watchdog_lockout) = true;
            }
            return;
          }
          if (id(hot_water_relay).state && id(relay_on_since_ms) > 0 &&
              (now - id(relay_on_since_ms)) / 1000 > id(max_on_seconds)) {
            ESP_LOGW("hw_safety", "Relay ON > %us -> OFF + lockout", id(max_on_seconds));
            id(hot_water_relay).turn_off();
            id(watchdog_lockout) = true;
            return;
          }
          if (sensor_bad && id(hot_water_relay).state) {
            ESP_LOGW("hw_safety", "Sensor bad -> relay OFF");
            id(hot_water_relay).turn_off();
            return;
          }
          if (id(watchdog_lockout)) {
            if (id(hot_water_relay).state) id(hot_water_relay).turn_off();
            return;
          }

          // ---- HA health ----
          const bool heartbeat_fresh = (id(ha_heartbeat_ms) != 0) &&
                                       ((now - id(ha_heartbeat_ms)) < 15UL * 60 * 1000);

          // Modes 1 & 2: HA drives. Do nothing locally.
          if (heartbeat_fresh) return;

          // ---- Mode 3: SURVIVAL ----
          if (!id(survival_enabled)) {
            if (id(hot_water_relay).state) id(hot_water_relay).turn_off();
            return;
          }
          if (sensor_bad) return;

          const uint32_t SURVIVAL_MIN_OFF_S = 180;  // 3 min anti-chatter
          const float critical_low = id(fallback_low_temp) - 3.0f;

          if (!id(hot_water_relay).state) {
            const uint32_t off_for_s = id(relay_off_since_ms) == 0
                ? SURVIVAL_MIN_OFF_S
                : (now - id(relay_off_since_ms)) / 1000;
            const bool critical = (t < critical_low);
            if (t < id(fallback_low_temp) && (off_for_s >= SURVIVAL_MIN_OFF_S || critical)) {
              ESP_LOGI("hw_survival", "ON at %.1f < %.1f (crit=%d)",
                       t, id(fallback_low_temp), (int)critical);
              id(hot_water_relay).turn_on();
            }
          } else {
            if (t > id(fallback_high_temp)) {
              ESP_LOGI("hw_survival", "OFF at %.1f > %.1f", t, id(fallback_high_temp));
              id(hot_water_relay).turn_off();
            }
          }

# Reduced logging - saves memory and noise
logger:
  level: WARN

# Home Assistant API — with services for heartbeat + survival config
api:
  encryption:
    key: "U23/jEthsNVcwd+sS6pj249MZEOQQRgHvcVBHdtlvu0="
  reboot_timeout: 0s
  services:
    - service: ha_heartbeat
      then:
        - lambda: 'id(ha_heartbeat_ms) = millis();'
    - service: set_survival_config
      variables:
        enabled: bool
        low_temp: float
        high_temp: float
        max_temp: float
        max_on_s: int
      then:
        - lambda: |-
            // Defensive validation — clamp to safe bounds, never reject outright so survival
            // always has usable thresholds. Log every coercion.
            auto finite = [](float v){ return !isnan(v) && !isinf(v); };
            float lo = finite(low_temp)  ? low_temp  : 38.0f;
            float hi = finite(high_temp) ? high_temp : 46.0f;
            float mx = finite(max_temp)  ? max_temp  : 65.0f;
            int   mo = max_on_s;

            if (lo < 25.0f) lo = 25.0f; if (lo > 55.0f) lo = 55.0f;
            if (hi < 30.0f) hi = 30.0f; if (hi > 65.0f) hi = 65.0f;
            if (mx < 50.0f) mx = 50.0f; if (mx > 80.0f) mx = 80.0f;
            if (mo < 600)   mo = 600;   if (mo > 14400) mo = 14400;

            if (hi <= lo) hi = lo + 2.0f;
            if (mx <= hi) mx = hi + 2.0f;

            const bool coerced =
                lo != low_temp || hi != high_temp || mx != max_temp || mo != max_on_s;
            if (coerced) {
              ESP_LOGW("hw_cfg",
                "Clamped survival config: in(low=%.1f high=%.1f max=%.1f max_on=%d) "
                "-> out(low=%.1f high=%.1f max=%.1f max_on=%d)",
                low_temp, high_temp, max_temp, max_on_s, lo, hi, mx, mo);
            }

            id(survival_enabled)   = enabled;
            id(fallback_low_temp)  = lo;
            id(fallback_high_temp) = hi;
            id(max_safe_temp)      = mx;
            id(max_on_seconds)     = (uint32_t)mo;
            ESP_LOGI("hw_cfg",
              "Survival config applied: enabled=%d low=%.1f high=%.1f max=%.1f max_on=%d",
              (int)enabled, lo, hi, mx, mo);
    - service: clear_watchdog_lockout
      then:
        - lambda: 'id(watchdog_lockout) = false;'

ota:
  - platform: esphome
    password: "7c209d6258e56f86393b5d137a74c663"

# Optional: keep this while you still care about reset reason / loop time
debug:
  update_interval: 10s
